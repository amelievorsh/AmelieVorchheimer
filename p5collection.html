<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5.js Collection Matrix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geo&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.1/addons/p5.sound.min.js"></script>
  
      <style>

    html, body {
      background-color: #05010c;
      color: #ff0033;
      font-family: 'Geo', monospace;
      margin: 0;
      padding: 20px;
      height: 100%;
      overflow-y: auto; /* Allow scrolling through your grid array */
    }

    /* Cyberpunk Grid Grid Configurations */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
      gap: 25px;
      padding: 20px;
    }

    .grid-item {
      background: #000;
      border: 1px solid #ff0033;
      box-shadow: 0 0 10px rgba(255, 0, 51, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      overflow: hidden;
    }

            .sketch-container {
      display: flex;
      justify-content: center; /* Center the sketch horizontally */
      align-items: flex-end; /* Align to the bottom of the container */
      width: 100%;
      flex-grow: 1; /* Allows the sketch container to take up available space */
      padding-top: 2rem; /* Add some space above the sketch */
    }

    .sketch-container canvas {
      max-width: 100%; /* Ensure the canvas is responsive */
      height: auto; /* Maintain aspect ratio */
      display: block; /* Remove extra space below the canvas */
    }

       </style>  
  </head>

  <body>
    <div class="container">
 <div class="grid-item">
    <div class="sketch-container" id="sketch-container">
    </div>
 <script src="sketch1.js"></script>   
  <div class="sketch-container" id="sketch-container">
    </div>
 <script src="sketch2.js"></script>   
   
    </div>
    
    <script src="sketch1.js"></script>
  <script src="sketch2.js"></script>
 
  </body>
</html>
