<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.11/addons/p5.sound.min.js"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.11/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <main>
    </main>
    <script>



var mic, osc;

var analyzer;
var numSamples = 1024;

// Array of amplitude values (-1 to +1) over time.
var samples = [];
var currentSource = "mic";

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  noFill();
  stroke(240);
  textFont('monospace');

  analyzer = new p5.FFT(0, numSamples);

  // set up various inputs. We'll toggle them when key "T" is pressed.
  mic = new p5.AudioIn();
  osc = new p5.Oscillator();
  osc.amp(0.5);
  osc.freq(10);

  mic.start();
  analyzer.setInput(mic);

}

function draw() {
  background(10);

  // get a buffer of 1024 samples over time.
  samples = analyzer.waveform();
  var bufLen = samples.length;

  // draw snapshot of the samples
  strokeWeight(2);
  stroke(166, 24, 155);
  noFill();
  beginShape();
  for (var i = 0; i < bufLen; i++){
    var x = map(i, 0, bufLen, 0, width);
    var y = map(samples[i], -1, 1, -height/2, height/2);
    vertex(x, y + height/2);
  }
  endShape();

  // map the oscillator frequency to mouse position
  var freq = map(mouseX, 0, windowWidth, 1, 440);
  osc.freq(freq, 0.01);
  var amp = map(mouseY, height, 0, 0, 1);
  osc.amp(amp, 0.01);

  labelStuff(freq, amp);

    // Text Styling
  textSize(30);
  textFont('Courier New');
  stroke('#9962b7');
  strokeWeight(1.5);
  fill('#6d275e');
  text('Choose your input!', 40, (windowHeight / 2) * 0.25);
}


// draw text
function labelStuff(freq, amp) {
textSize(20);
  textFont('Courier New');
  stroke('#673AB7');
  strokeWeight(1);
  fill('#542970');
  text('Press t to change source',20, (windowHeight) -(windowHeight/5));
  text('Source: '+ currentSource, 10, 40);

  // if currentSource is an oscillator:
  if (currentSource === 'sine' || currentSource == 'triangle' || currentSource == 'square' || currentSource == 'sawtooth') {
    text('Frequency: ' + freq, 20, 60);
    text('Amplitude: ' + amp, 20, 80);
  }
}


// ============
// toggle input
// ============

function keyPressed() {
  if (key == 't') {
    toggleInput();
  }
}


// start with mic as input
var inputMode = 0;

function toggleInput(mode) {
  if (typeof(mode) === 'number') {
    inputMode = mode;
  } else {
    inputMode += 1;
    inputMode = inputMode % 5;
  }
  switch (inputMode) {
    case 0: // mic mode
			osc.stop();
      mic.start();
      analyzer.setInput(mic);
      currentSource = 'mic';
      break;
    case 1: // sine mode
      osc.setType('sine');
      osc.start();
      mic.stop();
      analyzer.setInput(osc);
      currentSource = 'sine';
      break;
    case 2: // square mode
      osc.setType('triangle');
      currentSource = 'triangle';
      break;
    case 3: // square mode
      osc.setType('square');
      currentSource = 'square';
      break;
    case 4: // square mode
      osc.setType('sawtooth');
      currentSource = 'sawtooth';
      break;
  }
}

</script>
</body>
</html>
