  <!-- Google Font -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Geo', monospace;
      background-color: #05010c; /* Your deep dark base */
      color: #ff0019;
      overflow: hidden; /* Prevents scrollbars so boxes can be moved anywhere */
      position: relative;
    }

    /* CRT scanline overlay effect to match your other pages */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.25) 40%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 999;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    /* Fixed Header Area */
    header {
      position: absolute;
      top: 2rem;
      left: 2rem;
      z-index: 10;
      max-width: 600px;
      pointer-events: none; /* Let clicks pass through header background */
    }

    h1 {
      font-size: 4.5rem;
      margin: 0 0 0.5rem 0;
      color: #cd0011;
      text-shadow: 0 0 5px #ef5c6b;
      border-bottom: 2px solid #ff0019;
      padding-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .caption {
      font-size: 1.4rem;
      line-height: 1.4;
      text-shadow: 0 0 4px #e73b3d;
      pointer-events: auto; /* Allow users to read/interact if needed */
    }

    /* Draggable Video Box Containers */
    .video-box {
      position: absolute;
      width: 320px;
      background: #000;
      border: 1px solid #ff0019;
      box-shadow: 0 0 12px rgba(255, 0, 25, 0.2);
      z-index: 2;
      cursor: move; /* Shows movement cursor */
      transition: box-shadow 0.2s ease;
    }

    .video-box:hover {
      box-shadow: 0 0 20px rgba(255, 0, 25, 0.5);
      border-color: #ef5c6b;
    }

    /* The handle bar at the top of each video box */
    .video-handle {
      background: #ff0019;
      color: #000;
      padding: 3px 8px;
      font-size: 1.1rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .video-handle .status-dot {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: blink 1.5s steps(1) infinite;
    }

    /* Inner frame wrapping the actual video element */
    .video-content {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #05010c;
      display: block;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-info {
      padding: 6px 10px;
      font-size: 1.1rem;
      border-top: 1px dashed #ff0019;
      color: #ff0019;
      background: #000;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Bottom navigation control home button */
    .bottom-right {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: center;
      z-index: 1000;
    }

    .clickable-image {
      border: 0;
      cursor: pointer;
      width: 120px;
      transition: transform 0.3s ease;
    }

    .clickable-image:hover { transform: scale(1.05); }

    .nav-caption {
      font-size: 2.8rem;
      color: #ff0000;
      margin-top: 0.3rem;
      animation: blink 3s steps(1) infinite;
    }
  </style>
</head>

  <!-- Draggable Engine Script -->
  <script>
    // Target all containers with the class 'video-box'
    const boxes = document.querySelectorAll('.video-box');
    let highestZ = 10; // Keep track of layering when clicked

    boxes.forEach(box => {
      const handle = box.querySelector('.video-handle');
      let posX = 0, posY = 0, mouseX = 0, mouseY = 0;

      handle.onmousedown = dragMouseDown;
      // Also add touch support for mobile screens
      handle.ontouchstart = dragMouseDown;

      function dragMouseDown(e) {
        e = e || window.event;
        // Bring clicked box to the top layer
        highestZ++;
        box.style.zIndex = highestZ;

        // Extract coordinates based on event type (mouse vs touch)
        if (e.type === 'touchstart') {
          mouseX = e.touches[0].clientX;
          mouseY = e.touches[0].clientY;
          document.ontouchend = closeDragElement;
          document.ontouchmove = elementDrag;
        } else {
          e.preventDefault();
          mouseX = e.clientX;
          mouseY = e.clientY;
          document.onmouseup = closeDragElement;
          document.onmousemove = elementDrag;
        }
      }

      function elementDrag(e) {
        e = e || window.event;
        let currentX, currentY;

        if (e.type === 'touchmove') {
          currentX = e.touches[0].clientX;
          currentY = e.touches[0].clientY;
        } else {
          e.preventDefault();
          currentX = e.clientX;
          currentY = e.clientY;
        }

        // Calculate changes in coordinates
        posX = mouseX - currentX;
        posY = mouseY - currentY;
        mouseX = currentX;
        mouseY = currentY;

        // Assign new coordinates to the element container style
        box.style.top = (box.offsetTop - posY) + "px";
        box.style.left = (box.offsetLeft - posX) + "px";
      }

      function closeDragElement() {
        // Disconnect listeners when click/touch releases
        document.onmouseup = null;
        document.onmousemove = null;
        document.ontouchend = null;
        document.ontouchmove = null;
      }
    });
  </script>
