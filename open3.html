<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Amelie's World - Terminal Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: #05010c;
      color: #ff0033;
      font-family: 'Geo', monospace;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      cursor: crosshair;
    }

    /* Ambient scanline distortion texture layer overlay */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.25) 40%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 999;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    #sketch-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Draggable Main Frame Window Container */
    #face-mesh-emulator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000000;
      border: 3px solid #ff0033;
      padding: 45px 15px 15px 15px;
      box-shadow: 0px 0px 30px rgba(255, 0, 51, 0.4);
      z-index: 5;
      pointer-events: auto;
      cursor: move;
    }

    /* System Control Header Styling */
    #face-mesh-emulator::before {
      content: "■ hello gorgeous // Click facial points to navigate pathway";
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 1.4rem;
      color: #00ff66;
      text-shadow: 0 0 5px rgba(0, 255, 102, 0.8);
      letter-spacing: 1px;
    }

    #title {
      position: fixed;
      left: 40px;
      top: 30px;
      font-size: 6rem;
      color: #680e6d;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #730099;
      z-index: 10;
      text-transform: uppercase;
    }

    /* Side Column Navigation Layout Panels */
    .lefttable, .righttable {
      position: fixed;
      top: 150px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .lefttable { left: 40px; }
    .righttable { right: 40px; }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(10, 2, 20, 0.6);
      border: 1px dashed #ff0033;
      padding: 12px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .menu-item:hover {
      background: #ff0033;
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff0033;
    }

    .menu-item:hover .folder-name {
      color: #000;
      text-shadow: none;
    }

    .folder-icon {
      width: 60px;
      height: 45px;
      background: #ff0033;
      clip-path: polygon(0% 15%, 35% 15%, 45% 0%, 100% 0%, 100% 100%, 0% 100%);
      margin-bottom: 8px;
    }

    .menu-item:hover .folder-icon {
      background: #000;
    }

    .folder-name {
      color: #ff0033;
      font-size: 1.3rem;
      text-align: center;
      text-shadow: 0 0 5px rgba(255, 0, 51, 0.6);
    }

    /* Navigational Media Link Objects */
    .media-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: rgba(0,0,0,0.8);
      border: 1px solid #00ff66;
      padding: 10px;
      margin-bottom: 8px;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
    }

    .clickable-image {
      border: 0;
      width: 100px;
      height: 100px;
      margin-bottom: 8px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .media-card:hover .clickable-image {
      transform: scale(1.1) rotate(2deg);
    }

    .caption {
      font-size: 1.1rem;
      color: #00ff66;
      margin-top: 6px;
      text-shadow: 0 0 5px rgba(0,255,102,0.5);
    }

    /* Interactive Alert Box Terminal */
    .alert-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #000;
      border: 2px solid #00ff66;
      padding: 25px;
      box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
      z-index: 2000;
      display: block;
      text-align: center;
      width: 420px;
      max-width: 85%;
    }

    .alert-box p {
      margin: 0 0 20px 0;
      font-size: 1.8rem;
      line-height: 1.3;
      color: #00ff66;
    }

    .alert-box button {
      background-color: transparent;
      color: #00ff66;
      border: 1px solid #00ff66;
      padding: 8px 20px;
      font-family: 'Geo', monospace;
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .alert-box button:hover {
      background-color: #00ff66;
      color: #000;
    }

    /* Screen Breakpoint Responsive Adjustments */
    @media (max-width: 1024px) {
      #title { font-size: 3.5rem; left: 20px; top: 15px; }
      .lefttable, .righttable { top: auto; bottom: 20px; flex-direction: row; gap: 15px; }
      .lefttable { left: 20px; }
      .righttable { right: 20px; }
      #face-mesh-emulator { width: 95vw; height: auto; max-width: 640px; }
    }

    @media (max-width: 640px) {
      #title { font-size: 2.5rem; width: 100%; text-align: center; left: 0; }
      .lefttable { display: none; } /* Hide technical tables on compact mobiles to avoid overlap */
      .righttable { left: 50%; right: auto; transform: translateX(-50%); bottom: 15px; width: max-content; }
      .media-card { padding: 6px; }
      .clickable-image { width: 70px; height: 70px; }
    }
  </style>
</head>

<body>

  <div id="title">Amelie Vorchheimer</div>
    

  <div class="lefttable">
    <div class="menu-item" onclick="window.location.href='music.html'">
      <div class="folder-icon"></div>
      <div class="folder-name">Music</div>
    </div>
    <div class="menu-item" onclick="window.location.href='p5collection.html'">
      <div class="folder-icon"></div>
      <div class="folder-name">p5.js Projects</div>
    </div>
  </div>

  <div class="righttable">
  <div class="clickable-image" onclick="window.location.href='index2.html'">
    <div class="media-card"> 
      <a href="index2.html">
        <img src="eye1.gif" alt="Go Button" class="clickable-image">
      </a>
      <div class="caption">LOAD_VIDEOS</div>
    </div>

    <div class="clickable-image" onclick="window.location.href='index2.html'">
      <div class="media-card"> 
        <a href="aboutme3.html">
          <img src="pixel Emoji1.gif" alt="Go Button" class="clickable-image">
        </a>
        <div class="caption">ACCESS_ABOUT</div>
      </div>
        <div class="clickable-image" onclick="window.location.href='index2.html'">
          <div class="media-card"> 
            <a href="past works.html">
              <img src="star1.gif" alt="Go Button" class="clickable-image">
            </a>
            <div class="caption">VIEW_PORTFOLIO</div>

          </div>
          
  </div>
</script>
    
</body> 
</html>
